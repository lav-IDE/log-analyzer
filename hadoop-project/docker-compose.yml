version: '3.8'

networks:
  hadoop-network:
    driver: bridge

services:

  master:
    build:
      context: .
      dockerfile: dockerfile
    container_name: master
    hostname: master
    environment:
      - NODE_TYPE=master
    env_file:
      - hadoop.env
    ports:
      - "9870:9870"   # HDFS NameNode Web UI
      - "8088:8088"   # YARN ResourceManager Web UI
      - "9000:9000"   # HDFS
    volumes:
      - ../data:/data                           # dataset input
      - ../data/processed_data:/output          # parquet output for dashboard
      - ../spark:/spark                         # your analysis.py
      - namenode_data:/hadoop/namenode
    networks:
      - hadoop-network
    healthcheck:
      test: ["CMD", "hdfs", "dfsadmin", "-report"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker1:
    build:
      context: .
      dockerfile: dockerfile
    container_name: worker1
    hostname: worker1
    environment:
      - NODE_TYPE=worker
    env_file:
      - hadoop.env
    ports:
      - "8042:8042"   # NodeManager Web UI
    volumes:
      - datanode1_data:/hadoop/datanode
    networks:
      - hadoop-network
    depends_on:
      - master

  worker2:
    build:
      context: .
      dockerfile: dockerfile
    container_name: worker2
    hostname: worker2
    environment:
      - NODE_TYPE=worker
    env_file:
      - hadoop.env
    ports:
      - "8043:8042"   # NodeManager Web UI (mapped to different host port)
    volumes:
      - datanode2_data:/hadoop/datanode
    networks:
      - hadoop-network
    depends_on:
      - master

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data: